<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
  :root{
    --bg:#0f0f12;
    --bg-card:#17171c;
    --line:#2a2a30;
    --gold:#c9a86a;
    --gold-light:#e8d5a8;
    --text:#f2efe9;
    --text-dim:#a8a5a0;
    --snake:#7a9d6b;
    --food:#d98a4f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
    overflow:hidden;
    touch-action:none;
  }
  .wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    height:100%;
    padding:16px;
  }
  h1{
    font-size:20px;
    font-weight:700;
    letter-spacing:1px;
    margin-bottom:4px;
  }
  .sub{
    font-size:12px;
    color:var(--text-dim);
    margin-bottom:14px;
  }
  .hud{
    width:100%;
    max-width:380px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    font-size:13px;
  }
  .hud .badge{
    background:var(--bg-card);
    border:1px solid var(--line);
    padding:6px 12px;
    border-radius:20px;
    color:var(--gold-light);
    font-weight:700;
  }
  .board-wrap{
    position:relative;
    width:100%;
    max-width:380px;
    aspect-ratio:1/1;
    border-radius:16px;
    overflow:hidden;
    border:1px solid var(--line);
    background:var(--bg-card);
  }
  canvas{
    width:100%;
    height:100%;
    display:block;
  }
  .overlay{
    position:absolute;
    inset:0;
    background:rgba(8,8,10,0.92);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
    gap:10px;
  }
  .overlay.show{display:flex;}
  .overlay .emoji{font-size:48px;}
  .overlay h2{
    font-size:22px;
    font-weight:800;
    color:var(--gold-light);
  }
  .overlay p{
    font-size:13.5px;
    color:var(--text-dim);
  }
  .btn{
    margin-top:8px;
    background:var(--gold);
    color:#1a1410;
    font-weight:800;
    font-size:14px;
    padding:11px 28px;
    border-radius:30px;
    border:none;
    cursor:pointer;
  }
  .controls{
    margin-top:18px;
    display:grid;
    grid-template-columns:56px 56px 56px;
    grid-template-rows:56px 56px 56px;
    gap:8px;
  }
  .ctrl-btn{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:14px;
    color:var(--gold-light);
    font-size:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .ctrl-btn:active{background:var(--line);}
  .hint{
    margin-top:14px;
    font-size:11.5px;
    color:var(--text-dim);
    text-align:center;
  }
  .confetti{
    position:absolute;
    top:-10px;
    width:8px;height:8px;
    border-radius:2px;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{ transform:translateY(420px) rotate(540deg); opacity:0; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🐍 贪吃蛇</h1>
    <div class="sub">滑动屏幕或用方向键控制</div>
    <div class="hud">
      <div class="badge">得分 <span id="score">0</span></div>
      <div class="badge">目标 <span id="target">15</span></div>
    </div>
    <div class="board-wrap">
      <canvas id="board"></canvas>
      <div class="overlay" id="winOverlay">
        <div class="emoji">🎉</div>
        <h2>你真棒！</h2>
        <p id="winMsg">吃到 15 分，挑战成功</p>
        <button class="btn" id="restartBtn">再玩一次</button>
      </div>
      <div class="overlay" id="loseOverlay">
        <div class="emoji">💥</div>
        <h2>游戏结束</h2>
        <p id="loseMsg">得分：0</p>
        <button class="btn" id="restartBtn2">重新开始</button>
      </div>
    </div>
    <div class="controls">
      <div></div>
      <div class="ctrl-btn" data-dir="up">↑</div>
      <div></div>
      <div class="ctrl-btn" data-dir="left">←</div>
      <div></div>
      <div class="ctrl-btn" data-dir="right">→</div>
      <div></div>
      <div class="ctrl-btn" data-dir="down">↓</div>
      <div></div>
    </div>
    <div class="hint">达到目标分数即算获胜，会有惊喜哦</div>
  </div>

  <script>
    var canvas = document.getElementById('board');
    var ctx = canvas.getContext('2d');
    var GRID = 16;
    var cellSize, snake, dir, nextDir, food, score, target, running, loopId;

    function resize(){
      var size = canvas.clientWidth;
      canvas.width = size * devicePixelRatio;
      canvas.height = size * devicePixelRatio;
      ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
      cellSize = size / GRID;
      draw();
    }
    window.addEventListener('resize', resize);

    function randomFood(){
      var pos;
      do{
        pos = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)};
      } while(snake.some(function(s){ return s.x===pos.x && s.y===pos.y; }));
      return pos;
    }

    function init(){
      snake = [{x:8,y:8},{x:7,y:8},{x:6,y:8}];
      dir = {x:1,y:0};
      nextDir = {x:1,y:0};
      score = 0;
      target = 15;
      document.getElementById('score').textContent = score;
      document.getElementById('target').textContent = target;
      food = randomFood();
      running = true;
      document.getElementById('winOverlay').classList.remove('show');
      document.getElementById('loseOverlay').classList.remove('show');
      clearInterval(loopId);
      loopId = setInterval(tick, 280);
      resize();
    }

    function tick(){
      if(!running) return;
      dir = nextDir;
      var head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      if(head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID || snake.some(function(s){ return s.x===head.x && s.y===head.y; })){
        gameOver();
        return;
      }

      snake.unshift(head);

      if(head.x === food.x && head.y === food.y){
        score++;
        document.getElementById('score').textContent = score;
        if(score >= target){
          win();
          return;
        }
        food = randomFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw(){
      var w = canvas.clientWidth, h = canvas.clientHeight;
      ctx.clearRect(0,0,w,h);

      ctx.fillStyle = '#d98a4f';
      ctx.beginPath();
      var fx = food.x*cellSize + cellSize/2, fy = food.y*cellSize + cellSize/2;
      ctx.arc(fx, fy, cellSize*0.32, 0, Math.PI*2);
      ctx.fill();

      snake.forEach(function(s, i){
        ctx.fillStyle = i===0 ? '#c9a86a' : '#7a9d6b';
        var pad = cellSize*0.08;
        roundRect(ctx, s.x*cellSize+pad, s.y*cellSize+pad, cellSize-pad*2, cellSize-pad*2, cellSize*0.22);
        ctx.fill();
      });
    }

    function roundRect(ctx,x,y,w,h,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,x+w,y+h,r);
      ctx.arcTo(x+w,y+h,x,y+h,r);
      ctx.arcTo(x,y+h,x,y,r);
      ctx.arcTo(x,y,x+w,y,r);
      ctx.closePath();
    }

    function gameOver(){
      running = false;
      clearInterval(loopId);
      document.getElementById('loseMsg').textContent = '得分：' + score;
      document.getElementById('loseOverlay').classList.add('show');
    }

    function win(){
      running = false;
      clearInterval(loopId);
      document.getElementById('winMsg').textContent = '吃到 ' + target + ' 分，挑战成功';
      document.getElementById('winOverlay').classList.add('show');
      launchConfetti();
    }

    function launchConfetti(){
      var colors = ['#c9a86a','#e8d5a8','#7a9d6b','#d98a4f','#f2efe9'];
      var wrap = document.querySelector('.board-wrap');
      for(var i=0;i<40;i++){
        (function(i){
          setTimeout(function(){
            var el = document.createElement('div');
            el.className = 'confetti';
            el.style.left = Math.random()*100 + '%';
            el.style.background = colors[Math.floor(Math.random()*colors.length)];
            el.style.animationDuration = (1.2 + Math.random()*1.2) + 's';
            wrap.appendChild(el);
            setTimeout(function(){ el.remove(); }, 2600);
          }, i*30);
        })(i);
      }
    }

    function setDir(nx, ny){
      if(dir.x === -nx && dir.y === -ny) return;
      nextDir = {x:nx, y:ny};
    }

    document.addEventListener('keydown', function(e){
      if(e.key==='ArrowUp') setDir(0,-1);
      else if(e.key==='ArrowDown') setDir(0,1);
      else if(e.key==='ArrowLeft') setDir(-1,0);
      else if(e.key==='ArrowRight') setDir(1,0);
    });

    document.querySelectorAll('.ctrl-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var d = btn.getAttribute('data-dir');
        if(d==='up') setDir(0,-1);
        else if(d==='down') setDir(0,1);
        else if(d==='left') setDir(-1,0);
        else if(d==='right') setDir(1,0);
      });
    });

    var touchStart = null;
    var boardWrap = document.querySelector('.board-wrap');
    boardWrap.addEventListener('touchstart', function(e){
      var t = e.touches[0];
      touchStart = {x:t.clientX, y:t.clientY};
    }, {passive:true});
    boardWrap.addEventListener('touchend', function(e){
      if(!touchStart) return;
      var t = e.changedTouches[0];
      var dx = t.clientX - touchStart.x;
      var dy = t.clientY - touchStart.y;
      if(Math.abs(dx) > Math.abs(dy)){
        if(Math.abs(dx) > 20) setDir(dx>0?1:-1, 0);
      } else {
        if(Math.abs(dy) > 20) setDir(0, dy>0?1:-1);
      }
      touchStart = null;
    }, {passive:true});

    document.getElementById('restartBtn').addEventListener('click', init);
    document.getElementById('restartBtn2').addEventListener('click', init);

    init();
  </script>
</body>
</html>
